[kora]
rate_limit = 100
# Optional: Payment address to receive payment tokens (defaults to signer address)
# payment_address = "YourPaymentAddressPubkey11111111111111111111"

[kora.auth]
# Optional: API key for simple authentication
# api_key = "your-api-key-here"

# Optional: HMAC secret for signed requests
# hmac_secret = "your-hmac-secret-here"

# Optional: Maximum age in seconds for HMAC timestamp validation (default: 300)
# max_timestamp_age = 300

# Optional: reCAPTCHA v3 secret key for bot protection
# recaptcha_secret = "your-recaptcha-secret"

# Optional: Minimum reCAPTCHA score threshold (0.0 to 1.0, default: 0.5)
# recaptcha_score_threshold = 0.5

# Optional: RPC methods that require reCAPTCHA verification
# protected_methods = ["signTransaction", "signAndSendTransaction", "signBundle", "signAndSendBundle"]

[kora.cache]
enabled = false
default_ttl = 300
account_ttl = 60

[validation]
price_source = "Mock"
# Max SOL outflow from fee payer per tx (rent + transfers). Presale+metadata ~25.3M observed.
max_allowed_lamports = 1000000000
max_signatures = 10
allow_durable_transactions = false
allowed_programs = [
    "11111111111111111111111111111111",              # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",   # SPL Token Program
    "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb",   # Token-2022
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",  # Asntsociated Token Program
    "AddressLookupTab1e1111111111111111111111111",   # Address Lookup Table Program
    "ComputeBudget111111111111111111111111111111",  # Compute Budget Program
    "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",  # Memo Program
    "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s",  # Metaplex Token Metadata
    "Ed25519SigVerify111111111111111111111111111",   # CLOB match_* (Ed25519 precompile ix)
  # pm-svm devnet (declare_id! in lib.rs — live deploy; Anchor.toml IDs are stale shells)
    "FzLnnbKtQCTKviEbrDYMLZYXNDHQdjSSa4Ybj4jAbrUL",  # oracle
    "A6N1F8MRsdgcojAx8p6FaECvw8mo8w6qJcWsbKQBANK4",  # conditionalTokens
    "FCvCbWoLpzNYKzQnXYXCo1yz9DTpgUs11QqHVqnqtWhA",  # questionMarket
    "F7y5MfW8d5kqR25QHDhUQ9LrKCiZUZVF6Pdnw15q5zZW",  # hook
    "Cs4GY1yZVxjxhhyUum3AupMuS3bo4yKRXifgLTTAh1sf",  # clobExchange
    "DuYyXguB5PVSKg6E2p4XPrrXZSCJnuBhoGpkGCBN5bBb",  # feeManagement
    "2Rnw1VoEtsUMQ7wkvYZjDehqSqRob6uNkeymDfvKrquB",  # presale
]
# Mints users may interact with in sponsored transactions (not used for Kora fees when price.type = free)
allowed_tokens = [
    "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v", # mainnet USDC
    "So11111111111111111111111111111111111111112",  # wSOL
    "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU", # devnet USDC
]
# Empty when pricing is free — users pay no SPL token fee to Kora
allowed_spl_paid_tokens = []
disallowed_accounts = []

# Free pricing: limit what the sponsor wallet can do per instruction type.
# Presale txs use fee payer as source for System Transfer (SOL) + create_account rent.
[validation.fee_payer_policy]

[validation.fee_payer_policy.system]
allow_transfer = true
allow_assign = false
allow_create_account = true
allow_allocate = false

[validation.fee_payer_policy.system.nonce]
allow_initialize = false
allow_advance = false
allow_authorize = false
allow_withdraw = false

[validation.fee_payer_policy.spl_token]
allow_transfer = false
allow_burn = true
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = true
allow_initialize_mint = false
allow_initialize_account = true
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.fee_payer_policy.token_2022]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = false
allow_initialize_extension_authority = true
allow_freeze_account = false
allow_thaw_account = false

[validation.fee_payer_policy.alt]
allow_create = false
allow_extend = false
allow_freeze = false
allow_deactivate = false
allow_close = false

[kora.enabled_methods]
liveness = false
estimate_transaction_fee = true
estimate_bundle_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true
get_version = true

[validation.price]
type = "free"

[validation.token_2022]
transfer_hook_policy = "deny_mutable_for_delayed_signing"
# Product mints use TransferHook (see PrepareCondition CPI); do not block transfer_hook here
blocked_mint_extensions = [
    "permanent_delegate",
]
blocked_account_extensions = [
    # "confidential_transfer_account", # Confidential transfer state for the account
    # "non_transferable_account",      # Non-transferable token account
    # "transfer_hook_account",          # Transfer hook state for the account
    # "pausable_account",               # Pausable token account state
    # "memo_transfer",                  # Requires memo for transfers
    # "cpi_guard",                      # Prevents certain CPI calls
    # "immutable_owner",                # Account owner cannot be changed
    # "default_account_state",          # Default state for new accounts
]

[metrics]
enabled = true
endpoint = "/metrics"
port = 8080  # Same port as main server, or separate port like 9090
scrape_interval = 60

[metrics.fee_payer_balance]
enabled = true
expiry_seconds = 30

[kora.usage_limit]
enabled = false
cache_url = "redis://redis:6379"
max_transactions = 2
fallback_if_unavailable = false

[kora.bundle]
enabled = false
